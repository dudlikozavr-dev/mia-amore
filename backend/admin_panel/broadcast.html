<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Рассылка — Mia-Amore Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f5; color: #1c1c1e; }
    .header { background: #1c1c1e; color: #fff; padding: 16px 24px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .nav { background: #fff; border-bottom: 1px solid #e5e5ea; display: flex; overflow-x: auto; }
    .nav a { padding: 12px 20px; font-size: 14px; font-weight: 500; color: #636366;
             text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; }
    .nav a.active, .nav a:hover { color: #1c1c1e; border-bottom-color: #1c1c1e; }
    .main { max-width: 800px; margin: 0 auto; padding: 24px 16px; display: grid;
            grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 640px) { .main { grid-template-columns: 1fr; } }

    .card { background: #fff; border-radius: 12px; padding: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }

    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; font-weight: 500;
                      color: #636366; margin-bottom: 6px; }
    .form-row textarea { width: 100%; padding: 10px 12px; border: 1px solid #c7c7cc;
                         border-radius: 8px; font-size: 14px; font-family: inherit;
                         min-height: 120px; resize: vertical; }
    .form-row input[type=file] { width: 100%; padding: 8px 0; font-size: 14px; }

    .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 14px;
           font-weight: 500; cursor: pointer; width: 100%; }
    .btn-primary { background: #1c1c1e; color: #fff; }
    .btn-primary:hover { background: #3a3a3c; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* Превью */
    .preview-box { background: #f2f2f7; border-radius: 10px; padding: 16px;
                   font-size: 14px; white-space: pre-wrap; min-height: 80px;
                   margin-bottom: 16px; color: #3a3a3c; }
    .recipients-count { font-size: 13px; color: #636366; margin-bottom: 16px; }

    /* История */
    .history-item { padding: 14px 0; border-bottom: 1px solid #f2f2f7; }
    .history-item:last-child { border-bottom: none; }
    .history-item .meta { font-size: 12px; color: #636366; margin-top: 4px; }
    .progress-bar { height: 6px; background: #e5e5ea; border-radius: 3px;
                    margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; background: #1c1c1e; border-radius: 3px;
                     transition: width .3s; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 20px;
             font-size: 11px; font-weight: 500; }
    .badge-draft    { background: #f2f2f7; color: #636366; }
    .badge-sending  { background: #fff3e0; color: #e65100; }
    .badge-sent     { background: #e8f5e9; color: #2e7d32; }
    .badge-failed   { background: #ffebee; color: #b71c1c; }

    .loader { text-align: center; padding: 24px; color: #636366; font-size: 14px; }
  </style>
</head>
<body>
<div class="header"><h1>Mia-Amore Admin</h1></div>
<nav class="nav">
  <a href="index.html">Дашборд</a>
  <a href="orders.html">Заказы</a>
  <a href="products.html">Товары</a>
  <a href="broadcast.html" class="active">Рассылка</a>
</nav>

<div class="main">
  <!-- Форма создания -->
  <div class="card">
    <h2>Новая рассылка</h2>

    <div class="form-row">
      <label>Текст сообщения</label>
      <textarea id="bc-text" placeholder="Привет! У нас новинки — шёлковые халаты со скидкой 15%..."></textarea>
    </div>

    <div class="form-row">
      <label>Фото (опционально)</label>
      <input type="file" id="bc-photo" accept="image/*">
    </div>

    <div class="recipients-count" id="recipients-label">Загрузка...</div>

    <button class="btn btn-primary" id="send-btn" onclick="sendBroadcast()" disabled>
      Отправить рассылку
    </button>
    <p id="send-result" style="font-size:13px;margin-top:10px;display:none"></p>
  </div>

  <!-- История -->
  <div class="card">
    <h2>История рассылок</h2>
    <div id="history"><div class="loader">Загрузка...</div></div>
  </div>
</div>

<script>
const API = '';

function getToken() { return localStorage.getItem('mia_admin_token') || ''; }
function headers(extra={}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...headers(), ...(opts.headers||{}) } });
  if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(b.detail || res.status); }
  return res.json();
}

// Активируем кнопку когда есть текст
document.getElementById('bc-text').addEventListener('input', function() {
  document.getElementById('send-btn').disabled = !this.value.trim();
});

async function loadRecipients() {
  try {
    const orders = await apiFetch('/admin/orders');
    // Примерное кол-во покупателей — через заказы
    const uniqueBuyers = new Set(orders.map(o => o.buyer_name)).size;
    document.getElementById('recipients-label').textContent =
      `Будет отправлено всем незаблокированным покупателям`;
  } catch {
    document.getElementById('recipients-label').textContent = '';
  }
}

async function sendBroadcast() {
  const text = document.getElementById('bc-text').value.trim();
  if (!text) return;

  const btn = document.getElementById('send-btn');
  const result = document.getElementById('send-result');
  btn.disabled = true;
  btn.textContent = 'Отправляем...';

  const fd = new FormData();
  fd.append('text', text);
  const photoFile = document.getElementById('bc-photo').files[0];
  if (photoFile) fd.append('photo', photoFile);

  try {
    const broadcast = await fetch(`${API}/admin/broadcast`, {
      method: 'POST',
      headers: headers(),
      body: fd,
    }).then(async r => {
      if (!r.ok) { const b = await r.json().catch(()=>({})); throw new Error(b.detail || r.status); }
      return r.json();
    });

    document.getElementById('bc-text').value = '';
    document.getElementById('bc-photo').value = '';
    result.style.display = 'block';
    result.style.color = '#2e7d32';
    result.textContent = `✅ Рассылка #${broadcast.id} запущена`;

    // Начинаем следить за прогрессом
    trackProgress(broadcast.id);
    loadHistory();
  } catch(e) {
    result.style.display = 'block';
    result.style.color = '#ff3b30';
    result.textContent = `Ошибка: ${e.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Отправить рассылку';
  }
}

async function loadHistory() {
  try {
    const items = await apiFetch('/admin/broadcast');
    if (!items.length) {
      document.getElementById('history').innerHTML =
        '<div class="loader">Рассылок ещё не было</div>';
      return;
    }
    document.getElementById('history').innerHTML = items.map(b => {
      const pct = b.total_recipients > 0
        ? Math.round(b.sent_count / b.total_recipients * 100) : 0;
      return `
        <div class="history-item" id="bc-item-${b.id}">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;font-weight:600">#${b.id}</span>
            <span class="badge badge-${b.status}">${statusLabel(b.status)}</span>
          </div>
          <div style="font-size:13px;margin-top:4px;color:#3a3a3c;
                      overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px">
            ${b.text}
          </div>
          <div class="meta">
            ${b.total_recipients > 0
              ? `${b.sent_count} / ${b.total_recipients} отправлено`
              : 'Нет получателей'}
            ${b.failed_count > 0 ? ` · ${b.failed_count} ошибок` : ''}
            · ${b.created_at}
          </div>
          ${b.status === 'sending' ? `
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%"></div>
            </div>` : ''}
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('history').innerHTML =
      `<div class="loader" style="color:#ff3b30">Ошибка: ${e.message}</div>`;
  }
}

async function trackProgress(broadcastId) {
  const interval = setInterval(async () => {
    try {
      const b = await apiFetch(`/admin/broadcast/${broadcastId}`);
      const pct = b.total_recipients > 0
        ? Math.round(b.sent_count / b.total_recipients * 100) : 0;

      const item = document.getElementById(`bc-item-${broadcastId}`);
      if (item) {
        item.querySelector('.badge').className = `badge badge-${b.status}`;
        item.querySelector('.badge').textContent = statusLabel(b.status);
        const fill = item.querySelector('.progress-fill');
        if (fill) fill.style.width = pct + '%';
        const meta = item.querySelector('.meta');
        if (meta) meta.textContent =
          `${b.sent_count} / ${b.total_recipients} отправлено` +
          (b.failed_count > 0 ? ` · ${b.failed_count} ошибок` : '') +
          ` · ${b.created_at}`;
      }

      if (b.status !== 'sending') {
        clearInterval(interval);
        loadHistory(); // обновить весь список
      }
    } catch { clearInterval(interval); }
  }, 2000);
}

function statusLabel(s) {
  return { draft:'Черновик', sending:'Отправляется', sent:'Отправлена', failed:'Ошибка' }[s] || s;
}

if (!getToken()) { location.href = 'index.html'; }
else { loadRecipients(); loadHistory(); }
</script>
</body>
</html>
