<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Товары — Mia-Amore Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f5f5f5; color: #1c1c1e; }
    .header { background: #1c1c1e; color: #fff; padding: 16px 24px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .nav { background: #fff; border-bottom: 1px solid #e5e5ea; display: flex; overflow-x: auto; }
    .nav a { padding: 12px 20px; font-size: 14px; font-weight: 500; color: #636366;
             text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; }
    .nav a.active, .nav a:hover { color: #1c1c1e; border-bottom-color: #1c1c1e; }
    .main { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .toolbar h2 { font-size: 18px; font-weight: 600; flex: 1; }

    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .product-card { background: #fff; border-radius: 12px; overflow: hidden; }
    .product-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #f2f2f7; }
    .product-card .no-photo { width: 100%; aspect-ratio: 3/4; background: #f2f2f7;
                               display: flex; align-items: center; justify-content: center;
                               font-size: 32px; }
    .product-info { padding: 14px; }
    .product-info .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .product-info .meta { font-size: 13px; color: #636366; margin-bottom: 10px; }
    .product-info .price { font-size: 16px; font-weight: 700; }
    .product-info .price .old { font-size: 13px; color: #636366; text-decoration: line-through;
                                 margin-left: 6px; font-weight: 400; }
    .product-actions { padding: 0 14px 14px; display: flex; gap: 8px; }

    .btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px;
           font-weight: 500; cursor: pointer; }
    .btn-primary { background: #1c1c1e; color: #fff; }
    .btn-primary:hover { background: #3a3a3c; }
    .btn-ghost { background: transparent; border: 1px solid #c7c7cc; }
    .btn-ghost:hover { background: #f2f2f7; }
    .btn-danger { background: #ff3b30; color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
    .loader { text-align: center; padding: 40px; color: #636366; }

    .badge-inactive { display: inline-block; font-size: 11px; background: #ffebee;
                      color: #b71c1c; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }

    /* Modal */
    #modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.5);
                display: none; align-items: flex-start; justify-content: center;
                overflow-y: auto; padding: 24px; z-index: 100; }
    #modal-bg.open { display: flex; }
    #modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px;
             padding: 28px; position: relative; }
    #modal h3 { font-size: 18px; margin-bottom: 20px; }
    .form-row { margin-bottom: 16px; }
    .form-row label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #636366; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 9px 12px; border: 1px solid #c7c7cc; border-radius: 8px;
      font-size: 14px; font-family: inherit; }
    .form-row textarea { min-height: 80px; resize: vertical; }
    .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* Upload zone */
    .upload-zone { border: 2px dashed #c7c7cc; border-radius: 8px; padding: 20px;
                   text-align: center; cursor: pointer; font-size: 14px; color: #636366; }
    .upload-zone:hover, .upload-zone.drag { border-color: #1c1c1e; background: #f9f9fb; }
    .photos-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .photo-thumb { position: relative; width: 72px; }
    .photo-thumb img { width: 72px; height: 96px; object-fit: cover; border-radius: 6px; }
    .photo-thumb .del-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
                             background: #ff3b30; color: #fff; border: none; border-radius: 50%;
                             cursor: pointer; font-size: 12px; line-height: 20px; text-align: center; }
    .photo-thumb .type-btn { position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
                              background: #e5e5ea; border: none; border-radius: 10px; padding: 1px 5px;
                              font-size: 10px; cursor: pointer; white-space: nowrap; }
    .photo-thumb .type-btn.is-chart { background: #34c759; color: #fff; }
  </style>
</head>
<body>
<div class="header"><h1>Mia-Amore Admin</h1></div>
<nav class="nav">
  <a href="index.html">Дашборд</a>
  <a href="orders.html">Заказы</a>
  <a href="products.html" class="active">Товары</a>
  <a href="buyers.html">Покупатели</a>
  <a href="broadcast.html">Рассылка</a>
</nav>

<div class="main">
  <div class="toolbar">
    <h2>Товары</h2>
    <button class="btn btn-primary" onclick="openModal()">+ Добавить товар</button>
  </div>
  <div id="products-grid" class="products-grid">
    <div class="loader" style="grid-column:1/-1">Загрузка...</div>
  </div>
</div>

<!-- Modal: форма редактирования -->
<div id="modal-bg" onclick="e => { if(e.target===this) closeModal(); }">
  <div id="modal">
    <h3 id="modal-title">Новый товар</h3>
    <form id="product-form" onsubmit="saveProduct(event)">
      <input type="hidden" id="f-id">

      <div class="form-row">
        <label>Название</label>
        <input type="text" id="f-name" required placeholder="Халат «Bella»">
      </div>

      <div class="form-2col">
        <div class="form-row">
          <label>Категория</label>
          <select id="f-category"></select>
        </div>
        <div class="form-row">
          <label>Материал (slug)</label>
          <input type="text" id="f-material" placeholder="silk">
        </div>
      </div>

      <div class="form-row">
        <label>Материал (отображение)</label>
        <input type="text" id="f-material-label" placeholder="Шёлк 100%, 19 momme">
      </div>

      <div class="form-2col">
        <div class="form-row">
          <label>Цена, ₽</label>
          <input type="number" id="f-price" required min="1">
        </div>
        <div class="form-row">
          <label>Старая цена, ₽</label>
          <input type="number" id="f-old-price" min="0" placeholder="нет">
        </div>
      </div>

      <div class="form-row">
        <label>Бейдж</label>
        <select id="f-badge">
          <option value="">нет</option>
          <option value="hit">Хит</option>
          <option value="new">Новинка</option>
        </select>
      </div>

      <div class="form-row">
        <label>Размеры (через запятую)</label>
        <input type="text" id="f-sizes" placeholder="XS, S, M, L, XL" oninput="renderSizeStock()">
      </div>

      <div class="form-row">
        <label>Остаток по размерам <span id="f-stock-total" style="color:#636366;font-weight:400">— всего 0 шт.</span></label>
        <div id="f-size-stock" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px"></div>
        <div style="font-size:12px;color:#636366;margin-top:6px">Размер с 0 автоматически считается недоступным.</div>
      </div>

      <div class="form-row">
        <label>Цвета (через запятую)</label>
        <input type="text" id="f-colors" placeholder="Розовый, Чёрный, Бордо">
        <div style="font-size:12px;color:#636366;margin-top:6px">
          Можно задать свой hex: <code>Розовый #E8C8C0, Чёрный #1C1C1E</code>.
        </div>
      </div>

      <div class="form-row">
        <label>Описание</label>
        <textarea id="f-description"></textarea>
      </div>

      <div class="form-row">
        <label>Уход</label>
        <textarea id="f-care" style="min-height:60px"></textarea>
      </div>

      <div class="form-row">
        <label>Фотографии</label>
        <div class="photos-row" id="photos-row"></div>
        <div class="upload-zone" id="upload-zone"
             onclick="document.getElementById('file-input').click()"
             ondragover="e=>{e.preventDefault();this.classList.add('drag')}"
             ondragleave="e=>{this.classList.remove('drag')}"
             ondrop="handleDrop(event)">
          Нажмите или перетащите фото (JPEG, PNG, WebP, до 10 МБ)
        </div>
        <input type="file" id="file-input" accept="image/*" multiple
               style="display:none" onchange="handleFiles(this.files)">
      </div>

      <div class="form-row" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="f-active" checked style="width:auto">
        <label for="f-active" style="margin:0;color:#1c1c1e;font-size:14px">Товар активен</label>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn btn-primary" id="save-btn">Сохранить</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = '';
let categories = [];
let currentProductId = null;

// Справочник популярных цветов: название (в нижнем регистре) → hex
const COLOR_HEX = {
  'чёрный':'#1C1C1E','черный':'#1C1C1E',
  'белый':'#F5F5F7','молочный':'#F5F0E8','слоновая кость':'#F5F0E8','жемчужный':'#F0EDE8',
  'розовый':'#E8C8C0','пудровый':'#E8C8C0','пыльная роза':'#C9A0A0',
  'бежевый':'#D4B896','шампань':'#E8DCC8',
  'бордо':'#6B2D3E','баклажан':'#5E2E3B','марсала':'#8E3A3A','красный':'#C0392B',
  'графит':'#4A4A4E','серый':'#8E8E93','тёмно-серый':'#3A3A3C','темно-серый':'#3A3A3C',
  'тёмно-синий':'#2C3E6B','темно-синий':'#2C3E6B','синий':'#3B5998','голубой':'#5AC8FA',
  'изумруд':'#2D6A5F','изумрудный':'#2D6A5F','зелёный':'#34C759','зеленый':'#34C759','мятный':'#98D8C8',
  'фиолетовый':'#AF52DE','лавандовый':'#B8A9C9','сиреневый':'#C8A2C8',
  'коричневый':'#8B4513','шоколадный':'#7B3F00','капучино':'#A67B5B',
  'оранжевый':'#FF9500','жёлтый':'#FFCC00','желтый':'#FFCC00',
};

function parseColors(raw) {
  // "Розовый, Чёрный #1C1C1E" → [{name,hex}, ...]
  return raw.split(',').map(s => s.trim()).filter(Boolean).map(part => {
    const m = part.match(/^(.+?)\s+(#[0-9a-fA-F]{3,6})\s*$/);
    if (m) return { name: m[1].trim(), hex: m[2].toUpperCase() };
    const key = part.toLowerCase();
    return { name: part, hex: COLOR_HEX[key] || '#8E8E93' };
  });
}

function colorsToText(colors) {
  // [{name:'Розовый',hex:'#E8C8C0'}] → "Розовый #E8C8C0, ..."
  return (colors || []).map(c => {
    const known = COLOR_HEX[(c.name || '').toLowerCase()];
    // Если hex совпадает со справочником — не показывать
    return known && known.toUpperCase() === (c.hex || '').toUpperCase()
      ? c.name
      : `${c.name} ${c.hex}`;
  }).join(', ');
}

function getToken() { return localStorage.getItem('mia_admin_token') || ''; }
function headers(extra={}) { return { 'Authorization': 'Bearer ' + getToken(), ...extra }; }

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { ...opts, headers: { ...headers(), ...(opts.headers||{}) } });
  if (!res.ok) { const b = await res.json().catch(()=>({})); throw new Error(b.detail || res.status); }
  return opts.returnRaw ? res : res.json();
}

async function loadCategories() {
  categories = await apiFetch('/admin/categories');
  const sel = document.getElementById('f-category');
  sel.innerHTML = '<option value="">Без категории</option>' +
    categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

async function loadProducts() {
  try {
    const products = await apiFetch('/admin/products');
    if (!products.length) {
      document.getElementById('products-grid').innerHTML =
        '<div class="loader" style="grid-column:1/-1">Товаров нет</div>';
      return;
    }
    document.getElementById('products-grid').innerHTML = products.map(p => {
      const cover = p.images[0]?.url || null;
      return `
        <div class="product-card">
          ${cover
            ? `<img src="${cover}" alt="${p.name}" loading="lazy">`
            : '<div class="no-photo">📷</div>'
          }
          <div class="product-info">
            <div class="name">${p.name}
              ${!p.is_active ? '<span class="badge-inactive">скрыт</span>' : ''}
            </div>
            <div class="meta">${p.material_label || ''} · Остаток: ${p.stock} шт.</div>
            <div class="price">${p.price.toLocaleString('ru-RU')} ₽
              ${p.old_price ? `<span class="old">${p.old_price.toLocaleString('ru-RU')} ₽</span>` : ''}
            </div>
          </div>
          <div class="product-actions">
            <button class="btn btn-ghost btn-sm" style="flex:1" onclick="editProduct(${p.id})">Изменить</button>
            <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id}, '${p.name}')">Скрыть</button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('products-grid').innerHTML =
      `<div class="loader" style="color:#ff3b30;grid-column:1/-1">Ошибка: ${e.message}</div>`;
  }
}

async function openModal(product = null) {
  currentProductId = product?.id || null;
  document.getElementById('modal-title').textContent = product ? 'Редактировать товар' : 'Новый товар';
  document.getElementById('f-id').value = product?.id || '';
  document.getElementById('f-name').value = product?.name || '';
  document.getElementById('f-material').value = product?.material || '';
  document.getElementById('f-material-label').value = product?.material_label || '';
  document.getElementById('f-price').value = product?.price || '';
  document.getElementById('f-old-price').value = product?.old_price || '';
  document.getElementById('f-badge').value = product?.badge || '';
  document.getElementById('f-sizes').value = (product?.sizes || []).join(', ');
  renderSizeStock(product?.size_stock || {});
  document.getElementById('f-colors').value = colorsToText(product?.colors || []);
  document.getElementById('f-description').value = product?.description || '';
  document.getElementById('f-care').value = product?.care || '';
  document.getElementById('f-active').checked = product?.is_active !== false;

  // Категория
  document.getElementById('f-category').value = product?.category_id || '';

  // Фото
  renderPhotos(product?.images || []);

  document.getElementById('modal-bg').classList.add('open');
}

function renderPhotos(images) {
  document.getElementById('photos-row').innerHTML = images.map(img => {
    const isChart = img.image_type === 'size_chart';
    return `
    <div class="photo-thumb" id="img-${img.id}">
      <img src="${img.url}" alt="" style="${isChart ? 'outline:2px solid #34c759;border-radius:6px' : ''}">
      <button class="del-btn" onclick="deleteImage(${img.id}, ${currentProductId})" title="Удалить">✕</button>
      <button class="type-btn ${isChart ? 'is-chart' : ''}"
              onclick="toggleSizeChart(${img.id}, '${isChart ? 'gallery' : 'size_chart'}')"
              title="${isChart ? 'Снять метку таблицы размеров' : 'Отметить как таблицу размеров'}">
        ${isChart ? '📐 размеры' : '📐'}
      </button>
    </div>`;
  }).join('');
}

async function toggleSizeChart(imageId, newType) {
  try {
    await apiFetch(`/admin/products/images/${imageId}/type?image_type=${newType}`, { method: 'PATCH' });
    // Перезагрузить фото текущего товара
    const res = await apiFetch(`/admin/products/${currentProductId}`);
    renderPhotos(res.images || []);
  } catch(e) { alert('Ошибка: ' + e.message); }
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  currentProductId = null;
}

async function editProduct(id) {
  try {
    const p = await apiFetch(`/admin/products/${id}`);
    openModal(p);
  } catch(e) { alert('Ошибка: ' + e.message); }
}

/** Перерисовать сетку инпутов «остаток по размерам» из поля «Размеры».
 *  existing — объект {XS: 1, ...} для редактирования; иначе читаем текущие значения из DOM. */
function renderSizeStock(existing = null) {
  const sizes = document.getElementById('f-sizes').value
    .split(',').map(s=>s.trim()).filter(Boolean);
  const grid = document.getElementById('f-size-stock');
  // если existing не передан — сохранить то, что уже введено
  const current = existing || readSizeStockFromDom();
  grid.innerHTML = sizes.map(s => `
    <label style="display:flex;flex-direction:column;font-size:12px;color:#636366;font-weight:500">
      ${s}
      <input type="number" min="0" value="${current[s] ?? 0}"
             data-size="${s}" style="margin-top:4px" oninput="updateStockTotal()">
    </label>`).join('') || '<span style="color:#636366;font-size:13px">Сначала укажите размеры выше.</span>';
  updateStockTotal();
}

function readSizeStockFromDom() {
  const obj = {};
  document.querySelectorAll('#f-size-stock input[data-size]').forEach(inp => {
    obj[inp.dataset.size] = parseInt(inp.value) || 0;
  });
  return obj;
}

function updateStockTotal() {
  const total = Object.values(readSizeStockFromDom()).reduce((a,b)=>a+(b||0), 0);
  document.getElementById('f-stock-total').textContent = `— всего ${total} шт.`;
}

async function saveProduct(e) {
  e.preventDefault();
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Сохранение...';

  const colors = parseColors(document.getElementById('f-colors').value);

  const size_stock = readSizeStockFromDom();
  const body = {
    category_id: parseInt(document.getElementById('f-category').value) || null,
    name: document.getElementById('f-name').value.trim(),
    material: document.getElementById('f-material').value.trim() || null,
    material_label: document.getElementById('f-material-label').value.trim() || null,
    price: parseInt(document.getElementById('f-price').value),
    old_price: parseInt(document.getElementById('f-old-price').value) || null,
    badge: document.getElementById('f-badge').value || null,
    sizes: document.getElementById('f-sizes').value.split(',').map(s=>s.trim()).filter(Boolean),
    size_stock,
    colors,
    description: document.getElementById('f-description').value.trim() || null,
    care: document.getElementById('f-care').value.trim() || null,
    is_active: document.getElementById('f-active').checked,
    sort_order: 0,
  };

  try {
    const id = document.getElementById('f-id').value;
    if (id) {
      await apiFetch(`/admin/products/${id}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      closeModal();
      loadProducts();
    } else {
      const created = await apiFetch('/admin/products', {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      currentProductId = created.id;
      document.getElementById('f-id').value = created.id;
      document.getElementById('modal-title').textContent = 'Редактировать товар — теперь можно загрузить фото';
      loadProducts();
    }
  } catch(e) {
    alert('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Сохранить';
  }
}

async function deleteProduct(id, name) {
  if (!confirm(`Скрыть товар «${name}»? Он останется в базе (is_active=false).`)) return;
  try {
    await apiFetch(`/admin/products/${id}`, { method: 'DELETE' });
    loadProducts();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function deleteImage(imageId, productId) {
  if (!confirm('Удалить фото?')) return;
  try {
    await apiFetch(`/admin/products/images/${imageId}`, { method: 'DELETE' });
    document.getElementById(`img-${imageId}`)?.remove();
  } catch(e) { alert('Ошибка: ' + e.message); }
}

async function uploadFiles(files) {
  if (!currentProductId) { alert('Сначала сохраните товар, потом загружайте фото'); return; }
  for (const file of files) {
    const fd = new FormData();
    fd.append('file', file);
    try {
      const img = await apiFetch(`/admin/products/${currentProductId}/images`, {
        method: 'POST', body: fd });
      // Добавляем в превью
      const thumb = document.createElement('div');
      thumb.className = 'photo-thumb';
      thumb.id = `img-${img.id}`;
      thumb.innerHTML = `
        <img src="${img.url}" alt="">
        <button class="del-btn" onclick="deleteImage(${img.id}, ${currentProductId})">✕</button>
        <button class="type-btn" onclick="toggleSizeChart(${img.id}, 'size_chart')" title="Отметить как таблицу размеров">📐</button>`;
      document.getElementById('photos-row').appendChild(thumb);
    } catch(e) { alert(`Ошибка загрузки ${file.name}: ${e.message}`); }
  }
}

function handleFiles(fileList) { uploadFiles(Array.from(fileList)); }
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  uploadFiles(Array.from(e.dataTransfer.files));
}

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

if (!getToken()) { location.href = 'index.html'; }
else { Promise.all([loadCategories(), loadProducts()]); }
</script>
</body>
</html>
